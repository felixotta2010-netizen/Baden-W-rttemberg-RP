<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
body{background:linear-gradient(135deg,#0f172a,#020617);color:white;font-family:Arial;text-align:center;padding:20px;}
.box{background:rgba(30,41,59,0.8);padding:30px;border-radius:20px;width:90%;max-width:400px;margin:auto;margin-top:80px;}
input{width:90%;padding:15px;margin:15px 0;border-radius:12px;border:none;font-size:18px;}
button{padding:15px 30px;border-radius:12px;background:#38bdf8;border:none;font-weight:bold;font-size:18px;cursor:pointer;}
button:hover{background:#0ea5e9;}
</style>
</head>
<body>
<div class="box">
<h2>Admin Login</h2>
<input id="adminName" placeholder="Name"><br>
<input id="adminPass" type="password" placeholder="Passwort"><br>
<button onclick="login()">Login</button>
</div>

<script>
const admins = {"Felix":"86061","Admin2":"68160","Admin3":"12345"};
function login(){
  const name=document.getElementById("adminName").value;
  const pass=document.getElementById("adminPass").value;
  if(admins[name] && pass==="Baden-Württemberg-RP-is-"+admins[name]+"-the-best"){
    localStorage.setItem("isAdmin","true");
    localStorage.setItem("adminName",name);
    window.location.href="admin.html";
  } else { alert("Falscher Benutzer oder Passwort!"); }
}
</script>
</body>
</html>
